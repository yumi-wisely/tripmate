<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PotatoPlan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');
.logo-font { font-family: 'Dela Gothic One', cursive; }
body { background-color: #f8fafc; margin: 0; padding: 0; }
.no-scrollbar::-webkit-scrollbar { display: none; }
@keyframes bounce-in { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.animate-in { animation: bounce-in 0.2s ease-out forwards; }
@keyframes slide-up { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
.slide-up { animation: slide-up 0.3s ease-out forwards; }
.cover-hero {
  background: linear-gradient(160deg, #fbbf24 0%, #f59e0b 40%, #1e293b 100%);
  position: relative;
  overflow: hidden;
}
.cover-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.15) 0%, transparent 60%);
}
.icon-pill {
  display: inline-flex; align-items: center; justify-content: center;
  width: 52px; height: 52px; border-radius: 16px;
  font-size: 24px; cursor: pointer;
  border: 2.5px solid transparent;
  transition: all 0.15s;
}
.icon-pill.selected { border-color: #1e293b; background: #fef9c3; transform: scale(1.1); }
.icon-pill:not(.selected) { background: #f1f5f9; }
.task-check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #cbd5e1; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.task-check.done { background: #1e293b; border-color: #1e293b; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const firebaseConfig = {
  apiKey: "AIzaSyCcRLNQUUqgoIeLrudKJ9IsClwuc93WwHM",
  authDomain: "potatoplan-9dedc.firebaseapp.com",
  projectId: "potatoplan-9dedc",
  storageBucket: "potatoplan-9dedc.firebasestorage.app",
  messagingSenderId: "759154119060",
  appId: "1:759154119060:web:665a705e2f848d4dce3f81",
  databaseURL: "https://potatoplan-9dedc-default-rtdb.firebaseio.com"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ── アイコン定義 ──────────────────────────────
const EVENT_ICONS = [
  { key: 'food',     emoji: '🍽️', label: '食事' },
  { key: 'stay',     emoji: '🏨', label: '宿' },
  { key: 'activity', emoji: '🎡', label: 'アクティビティ' },
  { key: 'move',     emoji: '🚗', label: '移動' },
  { key: 'other',    emoji: '📌', label: 'その他' },
];

const QRCodeDisplay = ({ text }) => {
  const qrRef = useRef(null);
  useEffect(() => {
    if (qrRef.current && text) {
      qrRef.current.innerHTML = '';
      new QRCode(qrRef.current, { text, width: 140, height: 140 });
    }
  }, [text]);
  return <div ref={qrRef} className="p-4 bg-white rounded-3xl my-6 border border-yellow-100 min-w-[172px] min-h-[172px] flex items-center justify-center shadow-inner relative z-10"></div>;
};

const Icon = ({ name, size = 24, className = "" }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width:${size}px;height:${size}px;"></i>`;
      window.lucide.createIcons({ root: ref.current });
    }
  }, [name, size, className]);
  return <span ref={ref} className="inline-flex items-center justify-center"></span>;
};

// ── 表紙ページ ────────────────────────────────
const CoverPage = ({ trip, coverData, setCoverData, onSave, saving }) => {
  const [localData, setLocalData] = useState(coverData || { purpose: '', headerUrl: '', tasks: [] });
  const [newTask, setNewTask] = useState('');

  const update = (key, val) => setLocalData(p => ({ ...p, [key]: val }));

  const addTask = () => {
    if (!newTask.trim()) return;
    update('tasks', [...(localData.tasks || []), { id: Date.now().toString(), text: newTask.trim(), done: false }]);
    setNewTask('');
  };

  const toggleTask = (id) => {
    update('tasks', localData.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
  };

  const removeTask = (id) => {
    update('tasks', localData.tasks.filter(t => t.id !== id));
  };

  const handleSave = () => {
    setCoverData(localData);
    onSave(localData);
  };

  const done = (localData.tasks || []).filter(t => t.done).length;
  const total = (localData.tasks || []).length;

  return (
    <div className="flex-1 overflow-y-auto no-scrollbar">
      {/* ヒーロービジュアル */}
      <div className="cover-hero min-h-[220px] flex flex-col justify-end p-8 pb-6 relative">
        {localData.headerUrl && (
          <img src={localData.headerUrl} className="absolute inset-0 w-full h-full object-cover opacity-40" onError={e => e.target.style.display='none'} />
        )}
        <div className="relative z-10">
          <p className="text-[10px] font-black uppercase tracking-[0.2em] text-yellow-300 mb-1">{trip.start} — {trip.end}</p>
          <h2 className="text-4xl logo-font text-white uppercase italic tracking-tighter leading-none drop-shadow-lg">{trip.title}</h2>
        </div>
      </div>

      <div className="p-6 space-y-6 pb-32">
        {/* ヘッダー画像URL */}
        <div>
          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic block mb-2">Header Image URL</label>
          <input
            type="text"
            value={localData.headerUrl || ''}
            onChange={e => update('headerUrl', e.target.value)}
            placeholder="https://..."
            className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-medium text-sm outline-none focus:border-yellow-400 transition-all"
          />
          <p className="text-[10px] text-slate-300 mt-1 ml-1">Unsplash等の画像URLを貼り付けてください</p>
        </div>

        {/* 旅の目的 */}
        <div>
          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic block mb-2">旅の目的・テーマ</label>
          <textarea
            value={localData.purpose || ''}
            onChange={e => update('purpose', e.target.value)}
            placeholder="例：卒業旅行！みんなで最高の思い出を作る🥔"
            rows={3}
            className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-medium text-sm outline-none focus:border-yellow-400 transition-all resize-none leading-relaxed"
          />
        </div>

        {/* タスクリスト */}
        <div>
          <div className="flex items-center justify-between mb-3">
            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">持ち物・準備チェック</label>
            {total > 0 && (
              <span className="text-[10px] font-black text-slate-400">{done}/{total}</span>
            )}
          </div>

          {/* プログレスバー */}
          {total > 0 && (
            <div className="h-1.5 bg-slate-100 rounded-full mb-4 overflow-hidden">
              <div
                className="h-full bg-yellow-400 rounded-full transition-all duration-500"
                style={{ width: `${Math.round(done / total * 100)}%` }}
              />
            </div>
          )}

          <div className="space-y-2 mb-3">
            {(localData.tasks || []).map(task => (
              <div key={task.id} className="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl group animate-in">
                <div
                  className={`task-check ${task.done ? 'done' : ''}`}
                  onClick={() => toggleTask(task.id)}
                >
                  {task.done && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <span className={`flex-1 text-sm font-medium ${task.done ? 'line-through text-slate-300' : 'text-slate-700'}`}>{task.text}</span>
                <button onClick={() => removeTask(task.id)} className="opacity-0 group-hover:opacity-100 transition-opacity text-slate-200 active:text-red-400 text-lg leading-none">×</button>
              </div>
            ))}
          </div>

          <div className="flex gap-2">
            <input
              type="text"
              value={newTask}
              onChange={e => setNewTask(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addTask()}
              placeholder="アイテムを追加..."
              className="flex-1 bg-slate-50 border-2 border-slate-100 p-3 rounded-xl text-sm font-medium outline-none focus:border-yellow-400 transition-all"
            />
            <button onClick={addTask} className="bg-slate-900 text-white w-10 h-10 rounded-xl font-black text-lg flex items-center justify-center active:scale-90 transition-transform shrink-0">+</button>
          </div>
        </div>

        {/* 保存ボタン */}
        <button
          onClick={handleSave}
          disabled={saving}
          className="w-full bg-yellow-400 p-5 rounded-3xl font-black text-slate-900 shadow-lg active:scale-95 text-sm uppercase tracking-widest transition-all"
        >
          {saving ? 'Saving...' : '保存する 🥔'}
        </button>
      </div>
    </div>
  );
};

// ── メインApp ─────────────────────────────────
const App = () => {
  const [view, setView] = useState('TripList');
  const [innerView, setInnerView] = useState('cover'); // 'cover' | 'timeline'
  const [topTab, setTopTab] = useState('Trips');
  const [user, setUser] = useState(null);
  const [potatoId, setPotatoId] = useState(null);
  const [trips, setTrips] = useState([]);
  const [currentTrip, setCurrentTrip] = useState(null);
  const [events, setEvents] = useState([]);
  const [friends, setFriends] = useState([]);
  const [tripMembers, setTripMembers] = useState([{ id: 'ALL', name: '全員' }]);
  const [visibleMembers, setVisibleMembers] = useState(['ALL']);
  const [showAddModal, setShowAddModal] = useState(false);
  const [showSummonModal, setShowSummonModal] = useState(false);
  const [showNewTripModal, setShowNewTripModal] = useState(false);
  const [summonId, setSummonId] = useState('');
  const [newPlan, setNewPlan] = useState({ date: '', time: '12:00', title: '', type: 'SHARED', iconKey: 'other' });
  const [newTrip, setNewTrip] = useState({ title: '', start: '', end: '', invited: [] });
  const [selectedId, setSelectedId] = useState(null);
  const [coverData, setCoverData] = useState(null);
  const [coverSaving, setCoverSaving] = useState(false);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (u) => {
      if (u) {
        setUser(u);
        try {
          const userRef = db.collection('users').doc(u.uid);
          const doc = await userRef.get();
          let currentPotatoId = '';
          let currentFriends = [];
          if (doc.exists() && doc.data().potatoId) {
            const data = doc.data();
            currentPotatoId = data.potatoId;
            currentFriends = data.friends || [];
          } else {
            currentPotatoId = 'PBID-' + Math.random().toString(36).substr(2, 4).toUpperCase();
            await userRef.set({ potatoId: currentPotatoId, displayName: u.displayName || 'Potato User', photoURL: u.photoURL || '', friends: currentFriends, createdAt: Date.now() }, { merge: true });
          }
          setPotatoId(currentPotatoId);
          setFriends(currentFriends);
          db.collection('trips').where('memberIds', 'array-contains', currentPotatoId).onSnapshot(s => {
            const fetchedTrips = s.docs.map(d => ({ id: d.id, ...d.data() }));
            const getTime = (t) => t?.toDate ? t.toDate().getTime() : (t || 0);
            fetchedTrips.sort((a, b) => getTime(b.createdAt) - getTime(a.createdAt));
            setTrips(fetchedTrips);
          }, err => console.error("Trips error:", err));
        } catch (err) { console.error("Auth process error:", err); }
      } else {
        setUser(null); setPotatoId(null); setFriends([]); setTrips([]); setTopTab('Me');
      }
    });
    return () => unsub();
  }, []);

  useEffect(() => {
    if (currentTrip?.id) {
      const unsub = db.collection('trips').doc(currentTrip.id).collection('events').orderBy('time').onSnapshot(s => {
        setEvents(s.docs.map(d => ({ id: d.id, ...d.data() })));
      });
      return () => unsub();
    } else { setEvents([]); }
  }, [currentTrip?.id]);

  // 表紙データを Firestore から読み込む
  const loadCover = async (tripId) => {
    try {
      const doc = await db.collection('trips').doc(tripId).get();
      if (doc.exists()) {
        const data = doc.data();
        setCoverData(data.cover || { purpose: '', headerUrl: '', tasks: [] });
      }
    } catch (e) { console.error(e); }
  };

  const saveCover = async (data) => {
    if (!currentTrip?.id) return;
    setCoverSaving(true);
    try {
      await db.collection('trips').doc(currentTrip.id).update({ cover: data });
    } catch (e) { console.error(e); }
    setCoverSaving(false);
  };

  const handleCreateTrip = async () => {
    if (!newTrip.title || !newTrip.start || !newTrip.end) return;
    try {
      const members = [{ id: potatoId, name: user.displayName || 'Host', photo: user.photoURL || '' }, ...newTrip.invited];
      const memberIds = members.map(m => m.id);
      await db.collection('trips').add({ ...newTrip, members, memberIds, cover: { purpose: '', headerUrl: '', tasks: [] }, createdAt: Date.now() });
      setShowNewTripModal(false);
      setNewTrip({ title: '', start: '', end: '', invited: [] });
    } catch (err) { console.error("Trip creation error:", err); alert("作成に失敗しました: " + err.message); }
  };

  const getDates = (s, e) => {
    const d = []; let c = new Date(s); const stop = new Date(e);
    while (c <= stop) { d.push(new Date(c).toISOString().split('T')[0]); c.setDate(c.getDate() + 1); }
    return d;
  };

  const openTrip = (t) => {
    setCurrentTrip(t);
    setTripMembers([{ id: 'ALL', name: '全員' }, ...t.members]);
    setView('MainApp');
    setInnerView('cover');
    setNewPlan({ ...newPlan, date: t.start });
    loadCover(t.id);
  };

  return (
    <div className="max-w-md mx-auto h-screen bg-white flex flex-col relative shadow-2xl overflow-hidden">
      <div className={`flex w-[200%] h-full transition-transform duration-500 ease-in-out ${view === 'TripList' ? 'translate-x-0' : '-translate-x-1/2'}`}>

        {/* ===== VIEW: TripList ===== */}
        <div className="w-1/2 h-full flex flex-col relative">
          <header className="bg-yellow-400 p-8 pt-10 text-center shadow-sm shrink-0 relative z-10">
            <h1 className="text-3xl logo-font text-slate-900 tracking-tighter italic uppercase">PotatoPlan</h1>
          </header>
          <main className="flex-1 overflow-y-auto p-6 pb-28">
            {topTab === 'Trips' && (
              <div className="space-y-4 animate-in">
                <div className="flex justify-between items-center">
                  <h2 className="text-lg font-black italic text-slate-400 uppercase">My Trips</h2>
                  <button onClick={() => setShowNewTripModal(true)} className="w-10 h-10 bg-slate-900 text-white rounded-full font-black shadow-lg">+</button>
                </div>
                {trips.map(t => (
                  <div key={t.id} onClick={() => openTrip(t)} className="bg-yellow-400 p-8 rounded-[40px] shadow-lg border-b-8 border-yellow-600 active:translate-y-1 active:border-b-0 cursor-pointer mb-4 transition-all">
                    <h3 className="text-2xl font-black uppercase italic tracking-tighter">{t.title}</h3>
                    <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest">{t.start} - {t.end}</p>
                  </div>
                ))}
              </div>
            )}

            {topTab === 'Friends' && (
              <div className="space-y-4 animate-in">
                <h2 className="text-lg font-black italic text-slate-400 uppercase tracking-widest">Friends List</h2>
                {friends.map(f => (
                  <div key={f.id} className="bg-white p-4 rounded-3xl flex items-center justify-between border shadow-sm">
                    <div className="flex items-center gap-4"><img src={f.photo} className="w-10 h-10 rounded-full border-2 border-white shadow-sm" /><span className="font-black text-slate-700">{f.name}</span></div>
                    <span className="text-[10px] font-mono bg-slate-100 p-1 rounded">{f.id}</span>
                  </div>
                ))}
                <div className="flex gap-2 pt-4 border-t">
                  <input type="text" value={summonId} onChange={e => setSummonId(e.target.value)} placeholder="PBID-XXXX" className="flex-1 border-2 p-3 rounded-xl uppercase font-black text-sm outline-none" />
                  <button onClick={async () => {
                    try {
                      const s = await db.collection('users').where('potatoId', '==', summonId.toUpperCase()).get();
                      if (!s.empty) {
                        const f = s.docs[0].data();
                        const newFriend = { id: f.potatoId, name: f.displayName || 'Guest', photo: f.photoURL || '' };
                        if (friends.some(x => x.id === newFriend.id)) { alert('すでに追加されています🍟'); return; }
                        const updatedFriends = [...friends, newFriend];
                        setFriends(updatedFriends);
                        await db.collection('users').doc(user.uid).update({ friends: updatedFriends });
                        setSummonId('');
                      } else { alert('見つかりません🍟'); }
                    } catch (err) { console.error(err); }
                  }} className="bg-slate-900 text-white px-6 rounded-xl font-black text-xs uppercase shrink-0">追加</button>
                </div>
              </div>
            )}

            {topTab === 'Me' && (
              <div className="flex flex-col items-center animate-in">
                <h2 className="text-lg font-black italic text-slate-400 mb-6 uppercase tracking-widest text-center">Personal ID</h2>
                {user ? (
                  <div className="bg-yellow-50 p-8 rounded-[40px] border-2 border-yellow-200 w-full flex flex-col items-center shadow-lg">
                    <img src={user.photoURL} className="w-20 h-20 rounded-full mb-4 border-4 border-white shadow-md" />
                    <p className="font-black text-lg text-slate-700">{user.displayName}</p>
                    <QRCodeDisplay text={potatoId} />
                    <p className="text-2xl font-black logo-font text-slate-800 bg-white px-5 py-2 rounded-xl border-2 border-yellow-200 shadow-sm tracking-widest">{potatoId}</p>
                    <button onClick={() => auth.signOut()} className="mt-8 text-[10px] text-slate-300 font-bold underline uppercase italic">Logout</button>
                  </div>
                ) : (
                  <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="bg-slate-900 text-white px-10 py-5 rounded-full font-black shadow-xl uppercase tracking-widest">Login</button>
                )}
              </div>
            )}
          </main>

          {showNewTripModal && (
            <div className="absolute inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-6 backdrop-blur-md animate-in">
              <div className="w-full bg-white rounded-[40px] p-8 shadow-2xl max-h-[90%] flex flex-col overflow-y-auto no-scrollbar">
                <h2 className="text-xl font-black italic mb-6 uppercase tracking-widest text-center">New Trip</h2>
                <div className="space-y-4">
                  <input type="text" placeholder="TRIP NAME" value={newTrip.title} onChange={e => setNewTrip({ ...newTrip, title: e.target.value })} className="w-full bg-slate-50 border-2 p-4 rounded-2xl font-black outline-none focus:border-yellow-400" />
                  <div className="flex gap-2">
                    <input type="date" value={newTrip.start} onChange={e => setNewTrip({ ...newTrip, start: e.target.value })} className="flex-1 bg-slate-50 border-2 p-3 rounded-xl font-black text-xs" />
                    <input type="date" value={newTrip.end} onChange={e => setNewTrip({ ...newTrip, end: e.target.value })} className="flex-1 bg-slate-50 border-2 p-3 rounded-xl font-black text-xs" />
                  </div>
                  <p className="text-[10px] font-black text-slate-400 uppercase mt-4 italic border-b pb-2">Invite Friends</p>
                  <div className="space-y-2 max-h-40 overflow-y-auto pr-2">
                    {friends.map(f => (
                      <div key={f.id} onClick={() => {
                        const invited = newTrip.invited.some(i => i.id === f.id);
                        setNewTrip({ ...newTrip, invited: invited ? newTrip.invited.filter(i => i.id !== f.id) : [...newTrip.invited, f] });
                      }} className={`p-4 rounded-[24px] flex items-center gap-3 border-2 transition-all cursor-pointer ${newTrip.invited.some(i => i.id === f.id) ? 'bg-yellow-100 border-yellow-400 shadow-sm' : 'bg-white border-slate-50'}`}>
                        <img src={f.photo} className="w-8 h-8 rounded-full" />
                        <span className="text-sm font-black text-slate-700">{f.name}</span>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-2 pt-6">
                    <button onClick={() => setShowNewTripModal(false)} className="flex-1 p-4 font-black text-slate-300 uppercase text-xs">Cancel</button>
                    <button onClick={handleCreateTrip} className="flex-2 bg-slate-900 text-white px-8 p-4 rounded-3xl font-black shadow-lg uppercase text-[10px] tracking-widest">Create Trip</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          <nav className="absolute bottom-0 left-0 right-0 bg-white border-t p-6 pb-10 flex justify-around shadow-2xl z-20">
            <button onClick={() => setTopTab('Trips')} className={`flex flex-col items-center transition-colors ${topTab === 'Trips' ? 'text-yellow-500' : 'text-slate-200'}`}><Icon name="map" size={24} /><span className="text-[10px] mt-1 font-black italic">TRIPS</span></button>
            <button onClick={() => setTopTab('Friends')} className={`flex flex-col items-center transition-colors ${topTab === 'Friends' ? 'text-yellow-500' : 'text-slate-200'}`}><Icon name="users" size={24} /><span className="text-[10px] mt-1 font-black italic">FRIENDS</span></button>
            <button onClick={() => setTopTab('Me')} className={`flex flex-col items-center transition-colors ${topTab === 'Me' ? 'text-yellow-500' : 'text-slate-200'}`}><Icon name="user" size={24} /><span className="text-[10px] mt-1 font-black italic">ME</span></button>
          </nav>
        </div>

        {/* ===== VIEW: MainApp ===== */}
        <div className="w-1/2 h-full flex flex-col relative bg-white">
          <header className="bg-yellow-400 p-6 flex items-center justify-between shadow-sm shrink-0 z-10">
            <button onClick={() => setView('TripList')} className="p-2 bg-white/40 rounded-full active:scale-90 transition-transform">
              <Icon name="chevron-left" size={24} />
            </button>
            <h1 className="text-xl logo-font uppercase tracking-tighter italic truncate w-40 text-center">{currentTrip?.title || 'Trip'}</h1>
            <button onClick={() => setShowSummonModal(true)} className="bg-slate-900 text-white text-[10px] px-3 py-2 rounded-full font-black uppercase shrink-0">召喚</button>
          </header>

          {/* タブ切り替え：表紙 / タイムライン */}
          <div className="flex border-b bg-white shrink-0">
            <button
              onClick={() => setInnerView('cover')}
              className={`flex-1 py-3 text-[11px] font-black uppercase tracking-widest transition-colors ${innerView === 'cover' ? 'text-slate-900 border-b-2 border-slate-900' : 'text-slate-300'}`}
            >
              📋 表紙
            </button>
            <button
              onClick={() => setInnerView('timeline')}
              className={`flex-1 py-3 text-[11px] font-black uppercase tracking-widest transition-colors ${innerView === 'timeline' ? 'text-slate-900 border-b-2 border-slate-900' : 'text-slate-300'}`}
            >
              🗓 スケジュール
            </button>
          </div>

          {/* ── 表紙ビュー ── */}
          {innerView === 'cover' && currentTrip && (
            <CoverPage
              trip={currentTrip}
              coverData={coverData}
              setCoverData={setCoverData}
              onSave={saveCover}
              saving={coverSaving}
            />
          )}

          {/* ── タイムラインビュー ── */}
          {innerView === 'timeline' && (
            <div className="flex-1 flex flex-col overflow-hidden">
              {/* メンバーフィルター */}
              <div className="flex gap-4 p-5 overflow-x-auto border-b bg-slate-50 no-scrollbar shadow-inner shrink-0" onClick={() => setSelectedId(null)}>
                {tripMembers.map(m => (
                  <div key={m.id} onClick={e => { e.stopPropagation(); m.id !== 'ALL' && setVisibleMembers(p => p.includes(m.id) ? p.filter(x => x !== m.id) : [...p, m.id]); }}
                    className={`cursor-pointer flex flex-col items-center min-w-[70px] p-2 rounded-2xl transition-all ${visibleMembers.includes(m.id) ? 'bg-white shadow-md ring-4 ring-yellow-400 scale-105' : 'opacity-20'}`}>
                    {m.photo
                      ? <img src={m.photo} className="w-12 h-12 rounded-full border-2 border-white shadow-sm" />
                      : <div className="w-12 h-12 rounded-full bg-slate-800 text-white flex items-center justify-center text-xs font-black italic">ALL</div>}
                    <span className="text-[9px] font-black text-slate-500 mt-1 uppercase tracking-tighter truncate w-full text-center">{m.name ? m.name.split(' ')[0] : '...'}</span>
                  </div>
                ))}
              </div>

              {/* 日付スライド */}
              <div className="flex-1 flex overflow-x-auto snap-x snap-mandatory no-scrollbar bg-white" onClick={() => setSelectedId(null)}>
                {currentTrip && getDates(currentTrip.start, currentTrip.end).map((date, idx) => (
                  <div key={date} className="min-w-full h-full snap-start flex flex-col overflow-y-auto no-scrollbar p-8">
                    <div className="flex items-center gap-3 mb-8 shrink-0">
                      <div className="bg-slate-900 text-white w-10 h-10 rounded-full flex items-center justify-center font-black logo-font italic">{idx + 1}</div>
                      <div>
                        <p className="text-2xl font-black italic uppercase tracking-tighter leading-none">Day {idx + 1}</p>
                        <p className="text-[10px] font-black text-slate-300 tracking-widest uppercase mt-1">{date}</p>
                      </div>
                    </div>

                    <div className="border-l-4 border-yellow-100 ml-4 space-y-10 pl-8 pb-32 relative">
                      {events.filter(e => e.date === date && visibleMembers.includes(e.owner)).map((e, i) => {
                        const iconDef = EVENT_ICONS.find(ic => ic.key === e.iconKey) || EVENT_ICONS[4];
                        return (
                          <div key={i} className="relative animate-in" onClick={(ev) => { ev.stopPropagation(); setSelectedId(selectedId === e.id ? null : e.id); }}>
                            <div className={`absolute -left-[40px] top-1 w-6 h-6 rounded-full border-4 border-white shadow-sm transition-colors ${e.type === 'SHARED' ? 'bg-yellow-400' : 'bg-blue-400'}`}></div>
                            <div className="text-[10px] font-black text-slate-300 mb-2 uppercase tracking-widest italic">{e.time}</div>
                            <div className={`p-6 rounded-[32px] shadow-sm border-2 transition-all ${selectedId === e.id ? 'ring-4 ring-red-400 border-red-100 bg-red-50' : 'border-slate-50 bg-slate-50'}`}>
                              <div className="flex justify-between items-start">
                                <div className="flex items-center gap-3">
                                  <span className="text-2xl leading-none">{iconDef.emoji}</span>
                                  <div className={`text-md font-black italic ${selectedId === e.id ? 'text-red-600' : 'text-slate-700'}`}>{e.title}</div>
                                </div>
                                {selectedId === e.id && (
                                  <button onClick={async () => { if (confirm("消す？🍟")) await db.collection('trips').doc(currentTrip.id).collection('events').doc(e.id).delete(); }} className="p-2 bg-red-500 text-white rounded-full flex items-center justify-center active:scale-90 transition-transform">
                                    <Icon name="trash-2" size={16} />
                                  </button>
                                )}
                              </div>
                              <div className="text-[9px] font-bold text-slate-300 uppercase mt-2 tracking-widest italic">{e.ownerName}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── 予定追加モーダル ── */}
          {showAddModal && (
            <div className="absolute inset-0 bg-slate-900/60 z-50 flex items-end">
              <div className="w-full bg-white rounded-t-[50px] p-10 animate-in shadow-2xl max-h-[92%] overflow-y-auto no-scrollbar pb-10">
                <h2 className="text-2xl font-black italic uppercase mb-6">New Plan</h2>
                <div className="space-y-4">
                  {/* アイコン選択 */}
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic block mb-3">カテゴリ</label>
                    <div className="flex gap-3 flex-wrap">
                      {EVENT_ICONS.map(ic => (
                        <div key={ic.key} className="flex flex-col items-center gap-1">
                          <div
                            className={`icon-pill ${newPlan.iconKey === ic.key ? 'selected' : ''}`}
                            onClick={() => setNewPlan({ ...newPlan, iconKey: ic.key })}
                          >
                            {ic.emoji}
                          </div>
                          <span className="text-[9px] font-black text-slate-400 uppercase tracking-wide">{ic.label}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <input
                    type="text"
                    value={newPlan.title}
                    onChange={x => setNewPlan({ ...newPlan, title: x.target.value })}
                    className="w-full bg-slate-100 p-6 rounded-3xl font-black outline-none border-4 border-transparent focus:border-yellow-400 transition-all shadow-inner"
                    placeholder="予定は？"
                  />

                  <div className="flex flex-col gap-2">
                    <label className="text-[10px] font-black text-slate-400 uppercase ml-4 tracking-widest italic">Date</label>
                    <select value={newPlan.date} onChange={x => setNewPlan({ ...newPlan, date: x.target.value })} className="w-full bg-slate-100 p-5 rounded-3xl font-black outline-none shadow-inner border-2 border-slate-50">
                      {currentTrip && getDates(currentTrip.start, currentTrip.end).map(d => (<option key={d} value={d}>{d}</option>))}
                    </select>
                  </div>

                  <div className="flex gap-4">
                    <div className="flex-1 flex flex-col gap-2 text-center">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Time</label>
                      <input type="time" value={newPlan.time} onChange={x => setNewPlan({ ...newPlan, time: x.target.value })} className="w-full bg-slate-100 p-5 rounded-3xl font-black outline-none shadow-inner" />
                    </div>
                    <div className="flex-1 flex flex-col gap-2 text-center">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Type</label>
                      <select value={newPlan.type} onChange={x => setNewPlan({ ...newPlan, type: x.target.value })} className="w-full bg-slate-100 p-5 rounded-3xl font-black outline-none shadow-inner">
                        <option value="SHARED">全員</option>
                        <option value="PERSONAL">個人</option>
                      </select>
                    </div>
                  </div>

                  <button onClick={async () => {
                    if (!newPlan.title || !newPlan.date) return;
                    await db.collection('trips').doc(currentTrip.id).collection('events').add({
                      ...newPlan,
                      owner: newPlan.type === 'SHARED' ? 'ALL' : (potatoId || 'Me'),
                      ownerName: user?.displayName || 'Me',
                      createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setShowAddModal(false);
                    setNewPlan({ ...newPlan, title: '', iconKey: 'other' });
                  }} className="w-full bg-yellow-400 p-6 rounded-3xl font-black text-slate-900 shadow-xl active:scale-95 text-lg uppercase tracking-widest mt-6">
                    ADD TO TRIP
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ── 召喚モーダル ── */}
          {showSummonModal && (
            <div className="absolute inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-8 backdrop-blur-md animate-in">
              <div className="w-full bg-white rounded-[50px] p-10 shadow-2xl flex flex-col max-h-[80%]">
                <h2 className="text-2xl font-black italic mb-6 uppercase tracking-widest text-center">召喚リスト</h2>
                <div className="flex-1 overflow-y-auto space-y-4 pr-2 no-scrollbar">
                  {friends.map(f => (
                    <div key={f.id} onClick={() => { setTripMembers(p => p.find(x => x.id === f.id) ? p : [...p, f]); setShowSummonModal(false); }} className="bg-slate-50 p-5 rounded-[30px] flex items-center gap-4 active:bg-yellow-50 cursor-pointer shadow-sm">
                      <img src={f.photo} className="w-10 h-10 rounded-full border shadow-sm" />
                      <div className="font-black text-slate-700 text-sm">{f.name}</div>
                      <Icon name="user-plus" className="ml-auto text-slate-300 pointer-events-none" size={20} />
                    </div>
                  ))}
                  {friends.length === 0 && <p className="text-center py-6 text-[10px] font-black text-slate-300 uppercase leading-loose">仲間がいません🍟<br />MEタブでIDを確認しよう！</p>}
                </div>
                <button onClick={() => setShowSummonModal(false)} className="mt-8 font-black text-slate-300 text-[10px] uppercase tracking-widest border-t pt-4">CLOSE</button>
              </div>
            </div>
          )}

          {/* ── 予定追加ボタン（タイムラインのみ表示） ── */}
          <button
            onClick={() => setShowAddModal(true)}
            className={`absolute bottom-10 right-10 w-20 h-20 bg-slate-900 text-white rounded-full shadow-2xl flex items-center justify-center z-20 active:scale-90 font-black text-3xl transition-all duration-300 ${view === 'MainApp' && innerView === 'timeline' ? 'opacity-100 pointer-events-auto scale-100' : 'opacity-0 pointer-events-none scale-90'}`}
          >+</button>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
