<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="TripMate - 友達と旅程を共有するアプリ">
    <title>TripMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="app">
        <!-- ===== Login Screen ===== -->
        <section id="screen-login" class="screen active">
            <div class="login-container">
                <div class="login-logo">
                    <div class="logo-icon">✈️</div>
                    <h1 class="logo-text">TripMate</h1>
                    <p class="logo-subtitle">旅をもっと楽しく、みんなと共有</p>
                </div>
                <form id="login-form" class="login-form">
                    <button type="button" id="btn-google-login" class="btn-google">
                        <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Googleでログイン
                    </button>
                    <div id="login-loading" class="login-loading hidden">
                        <div class="spinner"></div>
                        <p>ログイン中...</p>
                    </div>
                </form>
            </div>
        </section>

        <!-- ===== Home Screen ===== -->
        <section id="screen-home" class="screen">
            <header class="app-header">
                <h1 class="header-title">TripMate</h1>
                <div class="header-actions">
                    <button id="btn-friends" class="icon-btn" aria-label="友達">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </button>
                    <button id="btn-profile" class="icon-btn" aria-label="プロフィール">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                </div>
            </header>

            <div class="home-content">
                <div id="trip-list" class="trip-list">
                    <!-- Trips rendered here -->
                </div>
                <div id="empty-trips" class="empty-state">
                    <div class="empty-icon">🌍</div>
                    <p class="empty-title">まだ旅行がありません</p>
                    <p class="empty-subtitle">新しい旅を計画しましょう！</p>
                </div>
            </div>

            <button id="btn-new-trip" class="fab" aria-label="新しい旅行">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </section>

        <!-- ===== Friends Screen ===== -->
        <section id="screen-friends" class="screen">
            <header class="app-header">
                <button class="icon-btn back-btn" data-back aria-label="戻る">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <h1 class="header-title">フレンド</h1>
                <div class="header-actions">
                    <button id="btn-add-friend" class="icon-btn" aria-label="友達追加">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    </button>
                </div>
            </header>
            <div class="friends-content">
                <div id="friend-list" class="friend-list">
                    <!-- Friends rendered here -->
                </div>
                <div id="empty-friends" class="empty-state">
                    <div class="empty-icon">👫</div>
                    <p class="empty-title">まだフレンドがいません</p>
                    <p class="empty-subtitle">IDやQRコードで友達を追加しよう</p>
                </div>
            </div>
        </section>

        <!-- ===== Profile Screen ===== -->
        <section id="screen-profile" class="screen">
            <header class="app-header">
                <button class="icon-btn back-btn" data-back aria-label="戻る">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <h1 class="header-title">プロフィール</h1>
                <div class="header-actions"></div>
            </header>
            <div class="profile-content">
                <div class="profile-card glass-card">
                    <div class="profile-avatar" id="profile-avatar">
                        <img id="profile-avatar-img" class="profile-avatar-img hidden" alt="" />
                        <span id="profile-avatar-emoji">🧑‍✈️</span>
                    </div>
                    <h2 id="profile-name" class="profile-name"></h2>
                    <p id="profile-email" class="profile-email"></p>
                    <div class="profile-id-section">
                        <label>あなたのID</label>
                        <div class="profile-id-row">
                            <code id="profile-id" class="profile-id"></code>
                            <button id="btn-copy-id" class="btn btn-sm btn-ghost" aria-label="IDをコピー">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="profile-qr-section">
                        <label>QRコード</label>
                        <div id="profile-qr" class="qr-container"></div>
                        <p class="qr-hint">友達にスキャンしてもらおう</p>
                    </div>
                </div>
                <button id="btn-logout" class="btn btn-danger btn-full">ログアウト</button>
            </div>
        </section>

        <!-- ===== Trip Detail Screen ===== -->
        <section id="screen-trip" class="screen">
            <header class="app-header">
                <button class="icon-btn back-btn" data-back aria-label="戻る">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <h1 id="trip-detail-title" class="header-title">旅行名</h1>
                <div class="header-actions">
                    <button id="btn-delete-trip" class="icon-btn" aria-label="旅行を削除">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
            </header>

            <div class="trip-meta" id="trip-meta"></div>

            <div class="day-tabs-wrapper">
                <div id="day-tabs" class="day-tabs">
                    <!-- Day tabs rendered here -->
                </div>
            </div>

            <div class="member-filter-wrapper">
                <div id="member-filter" class="member-filter">
                    <!-- Member filter tabs rendered here -->
                </div>
            </div>

            <div class="schedule-content">
                <div id="schedule-list" class="schedule-list">
                    <!-- Schedule items rendered here -->
                </div>
                <div id="empty-schedule" class="empty-state small">
                    <div class="empty-icon">📋</div>
                    <p class="empty-title">予定がありません</p>
                    <p class="empty-subtitle">＋ボタンで予定を追加しよう</p>
                </div>
            </div>

            <button id="btn-add-schedule" class="fab" aria-label="予定追加">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </section>

        <!-- ===== Modals ===== -->

        <!-- New Trip Modal -->
        <div id="modal-new-trip" class="modal-overlay">
            <div class="modal glass-modal">
                <div class="modal-header">
                    <h2>新しい旅行</h2>
                    <button class="icon-btn modal-close" data-close-modal aria-label="閉じる">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <form id="form-new-trip" class="modal-body">
                    <div class="input-group">
                        <label for="trip-name">旅の名前</label>
                        <input type="text" id="trip-name" placeholder="例：沖縄旅行 🌴" required maxlength="30">
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="trip-start">開始日</label>
                            <input type="date" id="trip-start" required>
                        </div>
                        <div class="input-group">
                            <label for="trip-end">終了日</label>
                            <input type="date" id="trip-end" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>一緒に行く友達</label>
                        <div id="friend-selector" class="friend-selector">
                            <p class="no-friends-msg">まだ友達が追加されていません</p>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">旅行を作成</button>
                </form>
            </div>
        </div>

        <!-- Add Friend Modal -->
        <div id="modal-add-friend" class="modal-overlay">
            <div class="modal glass-modal">
                <div class="modal-header">
                    <h2>フレンド追加</h2>
                    <button class="icon-btn modal-close" data-close-modal aria-label="閉じる">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="add-friend-tabs">
                        <button class="tab-btn active" data-tab="id-tab">IDで追加</button>
                        <button class="tab-btn" data-tab="qr-tab">QRで追加</button>
                    </div>
                    <div id="id-tab" class="tab-content active">
                        <form id="form-add-friend-id" class="friend-form">
                            <div class="input-group">
                                <label for="friend-id-input">フレンドID</label>
                                <input type="text" id="friend-id-input" placeholder="IDを入力" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full">追加する</button>
                        </form>
                    </div>
                    <div id="qr-tab" class="tab-content">
                        <div class="qr-scanner-area">
                            <div class="qr-scanner-placeholder">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3z"/><path d="M20 14v3h-3"/><path d="M14 20h3"/><path d="M20 20h0"/></svg>
                                <p>カメラでQRコードをスキャン</p>
                                <button id="btn-start-scan" class="btn btn-secondary">スキャン開始</button>
                            </div>
                            <video id="qr-video" class="qr-video" playsinline></video>
                            <div id="qr-scan-result" class="qr-scan-result"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Schedule Modal -->
        <div id="modal-add-schedule" class="modal-overlay">
            <div class="modal glass-modal">
                <div class="modal-header">
                    <h2>予定を追加</h2>
                    <button class="icon-btn modal-close" data-close-modal aria-label="閉じる">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <form id="form-add-schedule" class="modal-body">
                    <div class="input-group">
                        <label>公開範囲</label>
                        <div class="toggle-group">
                            <button type="button" class="toggle-btn active" data-scope="shared">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                みんなの予定
                            </button>
                            <button type="button" class="toggle-btn" data-scope="personal">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                自分だけ
                            </button>
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="schedule-time">開始時間</label>
                            <input type="time" id="schedule-time" required>
                        </div>
                        <div class="input-group">
                            <label for="schedule-end-time">終了時間</label>
                            <input type="time" id="schedule-end-time">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="schedule-title">予定の内容</label>
                        <input type="text" id="schedule-title" placeholder="例：空港到着 ✈️" required maxlength="50">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">追加する</button>
                </form>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
